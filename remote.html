<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>음성 리모컨 — 또박또박</title>
<style>
  /* ============================================================
     Greencar — Cobalt(Mono) 디자인 시스템 적용
     모노크롬 베이스 + 코발트(#2d5bff)는 가장 중요한 CTA 하나·포커스·
     선택 상태에만 절제 사용. 프라이머리 액션은 잉크(gray-900).
     토큰값은 Greencar-UXD/design-system tokens/*.css 에서 가져옴.
     (어르신 가독성 위해 본문/명령 글씨만 토큰 스케일 위로 확장)
     ============================================================ */
  @font-face {
    font-family:"Pretendard"; font-weight:100 900; font-style:normal; font-display:swap;
    src:url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2") format("woff2-variations");
  }
  :root {
    --gray-0:#ffffff; --gray-50:#f7f8f9; --gray-100:#eceef1; --gray-200:#dde0e5;
    --gray-300:#c5cad1; --gray-400:#9aa1ab; --gray-500:#6b727d; --gray-600:#4d535d;
    --gray-800:#24282e; --gray-900:#14171b;
    --cobalt-50:#eef2ff; --cobalt-200:#bccbff; --cobalt-500:#2d5bff; --cobalt-600:#2447e0;
    --success-500:#0fa968; --success-600:#0c8a54; --success-50:#e2f6ed;
    --danger-500:#e0433a; --danger-600:#c5352d; --danger-50:#fbe9e8;
    /* semantic (light) */
    --text-primary:var(--gray-900); --text-secondary:var(--gray-600); --text-tertiary:var(--gray-400);
    --text-accent:var(--cobalt-600);
    --surface-page:var(--gray-50); --surface-card:var(--gray-0); --surface-sunken:var(--gray-100);
    --surface-accent-subtle:var(--cobalt-50);
    --border:var(--gray-200); --border-strong:var(--gray-300); --border-accent:var(--cobalt-500);
    --accent:var(--cobalt-500); --accent-hover:var(--cobalt-600); --on-accent:var(--gray-0); --focus-ring:var(--cobalt-500);
    --action-primary-bg:var(--gray-900); --action-primary-bg-hover:var(--gray-800); --action-primary-fg:var(--gray-0);
    /* type */
    --font-text:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700;
    /* spacing / radius / shadow / motion */
    --space-3:12px; --space-4:16px; --space-5:20px; --space-6:24px;
    --radius-sm:8px; --radius-md:12px; --radius-lg:16px; --radius-xl:20px; --radius-pill:999px;
    --shadow-sm:0 1px 2px rgba(16,18,29,.06),0 1px 3px rgba(16,18,29,.04);
    --shadow-md:0 2px 4px rgba(16,18,29,.05),0 8px 16px -8px rgba(16,18,29,.12);
    --ease-out:cubic-bezier(.2,.8,.2,1); --dur-fast:120ms; --dur-base:200ms;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; }
  body {
    background:var(--surface-page); color:var(--text-primary);
    font-family:var(--font-text); font-weight:var(--fw-regular); font-size:18px; line-height:1.5;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    padding:0 16px calc(20px + env(safe-area-inset-bottom)); max-width:560px; margin:0 auto;
  }
  .wrap { display:flex; flex-direction:column; gap:14px; }

  /* 헤더 */
  header { display:flex; align-items:center; justify-content:space-between;
    padding:18px 2px calc(6px + env(safe-area-inset-top)); }
  .brand { display:flex; align-items:center; gap:10px; font-weight:var(--fw-bold); font-size:20px; letter-spacing:-.01em; }
  .brand .mark { width:32px; height:32px; border-radius:var(--radius-sm); background:var(--action-primary-bg);
    color:var(--on-accent); display:flex; align-items:center; justify-content:center; }
  .brand .mark svg { width:18px; height:18px; }
  .badge { font-size:12px; font-weight:var(--fw-semibold); letter-spacing:.02em; color:var(--text-secondary);
    background:var(--surface-sunken); border-radius:var(--radius-pill); padding:5px 12px; }

  /* 인식 결과 카드 */
  .screen { position:relative; overflow:hidden; background:var(--surface-card); border:1px solid var(--border);
    border-radius:var(--radius-xl); box-shadow:var(--shadow-sm); min-height:190px; padding:26px 22px;
    text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
  .chip { font-size:14px; font-weight:var(--fw-semibold); letter-spacing:.01em; padding:5px 13px; border-radius:var(--radius-pill);
    background:var(--surface-accent-subtle); color:var(--text-accent); }
  .screen.idle .chip { display:none; }
  .screen.unknown .chip { background:var(--danger-50); color:var(--danger-600); }
  .cmd { font-weight:var(--fw-bold); letter-spacing:-.02em; color:var(--text-primary);
    font-size:clamp(40px,11vw,58px); line-height:1.08; }
  .screen.idle .cmd { font-size:clamp(22px,6vw,28px); color:var(--text-secondary); font-weight:var(--fw-semibold); }
  .screen.unknown .cmd { color:var(--danger-600); }
  .detail { font-size:18px; font-weight:var(--fw-medium); color:var(--text-secondary); }
  .heard { font-size:15px; color:var(--text-tertiary); }
  .heard:empty { display:none; }
  .sentband { display:none; align-items:center; justify-content:center; gap:7px; margin-top:2px;
    color:var(--success-600); font-weight:var(--fw-bold); font-size:16px; }
  .screen.sent .sentband { display:inline-flex; }
  .sentband svg { width:18px; height:18px; }
  @keyframes cardin { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .screen.flip { animation:cardin var(--dur-base) var(--ease-out); }

  /* 눌러서 말하기 — 이 화면의 단 하나의 코발트 CTA */
  .mic { width:100%; min-height:92px; border:none; border-radius:var(--radius-lg); cursor:pointer;
    background:var(--accent); color:var(--on-accent); font-size:22px; font-weight:var(--fw-bold); letter-spacing:-.01em;
    display:flex; align-items:center; justify-content:center; gap:12px; box-shadow:var(--shadow-md);
    transition:background var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out); }
  .mic:hover { background:var(--accent-hover); }
  .mic:active { transform:scale(.99); }
  .mic svg { width:28px; height:28px; }
  .mic .dot { display:none; width:11px; height:11px; border-radius:50%; background:#fff; }
  .mic.live { background:var(--accent-hover); }
  .mic.live .dot { display:inline-block; animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity:.3; } }

  /* 큰 버튼 (세컨더리 타일) */
  .pad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .pad button { background:var(--surface-card); border:1px solid var(--border-strong); border-radius:var(--radius-lg);
    min-height:88px; padding:12px 6px; cursor:pointer; color:var(--text-primary);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    font-size:17px; font-weight:var(--fw-semibold);
    transition:background var(--dur-fast) var(--ease-out), border-color var(--dur-fast), transform var(--dur-fast); }
  .pad button:hover { background:var(--surface-sunken); }
  .pad button:active { transform:scale(.985); }
  .pad button svg { width:28px; height:28px; color:var(--text-secondary); }
  .pad button.power { color:var(--danger-600); }
  .pad button.power svg { color:var(--danger-500); }
  .pad button.wide { grid-column:1 / -1; flex-direction:row; min-height:60px; gap:10px; font-size:18px; }
  .pad button.wide svg { color:var(--text-secondary); }

  /* LG TV 연결 카드 */
  .tvbox { background:var(--surface-card); border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow-sm); overflow:hidden; }
  .tvhead { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:16px 18px; font-weight:var(--fw-bold); font-size:16px; }
  .tvhead .ttl { display:flex; align-items:center; gap:8px; }
  .tvhead svg { width:20px; height:20px; color:var(--text-secondary); }
  .beta { font-size:11px; font-weight:var(--fw-semibold); letter-spacing:.02em; color:var(--text-secondary); background:var(--surface-sunken); border-radius:var(--radius-pill); padding:2px 9px; }
  .tvstate { font-size:13px; font-weight:var(--fw-semibold); color:var(--text-tertiary); }
  .tvstate.ok { color:var(--success-600); } .tvstate.err { color:var(--danger-600); }
  .tvbody { padding:16px 18px 18px; border-top:1px solid var(--border); }
  .tvhelp { font-size:14px; line-height:1.55; color:var(--text-secondary); margin:0 0 14px; }
  .tvhelp b { color:var(--text-primary); font-weight:var(--fw-semibold); }
  .tvrow { display:flex; gap:8px; }
  .tvip { flex:1 1 auto; min-width:0; font:inherit; font-size:18px; font-weight:var(--fw-semibold); font-variant-numeric:tabular-nums;
    padding:13px; border:1px solid var(--border-strong); border-radius:var(--radius-md); background:var(--surface-card); color:var(--text-primary); }
  .tvip::placeholder { color:var(--text-tertiary); font-weight:var(--fw-regular); }
  .tvip:focus { outline:none; border-color:var(--border-accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
  .tvbtn { flex:0 0 auto; white-space:nowrap; border:none; background:var(--action-primary-bg); color:var(--action-primary-fg);
    font-weight:var(--fw-semibold); font-size:16px; padding:0 22px; border-radius:var(--radius-md); cursor:pointer;
    transition:background var(--dur-fast) var(--ease-out); }
  .tvbtn:hover { background:var(--action-primary-bg-hover); }
  .tvmsg { font-size:14px; font-weight:var(--fw-medium); margin-top:12px; min-height:18px; color:var(--text-secondary); }
  .tvmsg.ok { color:var(--success-600); font-weight:var(--fw-semibold); } .tvmsg.err { color:var(--danger-600); font-weight:var(--fw-semibold); }

  footer { text-align:center; padding:6px 0 2px; }
  footer a { color:var(--text-secondary); font-size:15px; font-weight:var(--fw-medium); text-decoration:none; }
  footer a:hover { color:var(--text-primary); }

  :focus-visible { outline:2px solid var(--focus-ring); outline-offset:2px; border-radius:6px; }

  @media (prefers-reduced-motion: reduce) {
    .screen.flip { animation:none; }
    .mic.live .dot { animation:none; }
    .mic:active, .pad button:active { transform:none; }
  }
</style>
</head>
<body>
  <header>
    <span class="brand">
      <span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="2" width="12" height="20" rx="3"/><circle cx="12" cy="7" r="1.4" fill="currentColor" stroke="none"/><path d="M9 12h6M9 16h6"/></svg></span>
      음성 리모컨
    </span>
    <span class="badge">시제품</span>
  </header>

  <div class="wrap">
    <!-- 인식 결과 카드 -->
    <div class="screen idle" id="screen">
      <span class="chip" id="scIcon">명령</span>
      <div class="cmd" id="scLabel">버튼을 누르고 말해보세요</div>
      <div class="detail" id="scDetail">예: “소리 키워줘”, “다음 채널”, “유튜브 틀어줘”</div>
      <div class="heard" id="scHeard"></div>
      <div class="sentband" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>TV로 보냄
      </div>
    </div>

    <!-- 눌러서 말하기 (코발트 CTA) -->
    <button class="mic" id="micBtn" type="button">
      <span class="dot" aria-hidden="true"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
      <span id="micText">눌러서 말하기</span>
    </button>

    <!-- 큰 버튼 -->
    <div class="pad">
      <button class="power" data-cmd="POWER" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v9"/><path d="M6.6 6.6a8 8 0 1 0 10.8 0"/></svg>전원</button>
      <button data-cmd="CH_UP" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="7.5" width="19" height="12" rx="2"/><path d="M8 4l4-2 4 2"/><path d="M12 10v6M9 13h6"/></svg>채널 +</button>
      <button data-cmd="VOL_UP" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9.5v5h3.5L13 19V5L7.5 9.5H4z"/><path d="M16.5 8.5a5 5 0 0 1 0 7"/><path d="M19 6a9 9 0 0 1 0 12"/></svg>소리 +</button>
      <button data-cmd="MUTE" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9.5v5h3.5L13 19V5L7.5 9.5H4z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>음소거</button>
      <button data-cmd="CH_DOWN" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="7.5" width="19" height="12" rx="2"/><path d="M8 4l4-2 4 2"/><path d="M9 13h6"/></svg>채널 −</button>
      <button data-cmd="VOL_DOWN" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9.5v5h3.5L13 19V5L7.5 9.5H4z"/><path d="M16.5 8.5a5 5 0 0 1 0 7"/></svg>소리 −</button>
      <button class="wide" data-cmd="HOME" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>홈 / 앱 목록</button>
    </div>

    <!-- LG TV 연결 -->
    <div class="tvbox" id="tvbox">
      <div class="tvhead">
        <span class="ttl">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="5" width="19" height="13" rx="2"/><path d="M8 21h8"/></svg>
          LG TV 연결 <span class="beta">베타</span>
        </span>
        <span class="tvstate" id="tvState">연결 안 됨</span>
      </div>
      <div class="tvbody" id="tvBody">
        <p class="tvhelp">실제 TV 제어는 <b>또박또박 앱</b>에서, TV와 <b>같은 와이파이</b>일 때 동작해요.
          TV의 IP는 LG TV의 <b>설정 → 네트워크</b>에서 볼 수 있어요.</p>
        <div class="tvrow">
          <input id="tvIp" class="tvip" type="text" inputmode="decimal" autocomplete="off" placeholder="예: 192.168.0.12" aria-label="TV IP 주소">
          <button id="tvConnect" class="tvbtn" type="button">연결</button>
        </div>
        <div class="tvmsg" id="tvMsg"></div>
      </div>
    </div>

    <footer><a href="./">← 또박또박으로</a></footer>
  </div>

<script src="lg-webos.js"></script>
<script>
(function () {
  "use strict";

  // ── 한국어 음성 명령 → 의도(intent) 파서 ──
  function A(label, icon, detail, cmd, kind, value) {
    return { label: label, icon: icon, detail: detail, cmd: cmd || null, kind: kind || "ok", value: value };
  }
  function parseIntent(raw) {
    var s = (raw || "").replace(/\s+/g, "");
    if (!s) return null;
    var num = (s.match(/(\d+)\s*번/) || s.match(/(\d+)/) || [])[1];
    if (/(음소거|무음|소리꺼|소리끄|조용)/.test(s)) return A("음소거", "🔇", "소리를 끕니다", "MUTE");
    if (/(소리|음량|볼륨)/.test(s) && /(키|높|올|크)/.test(s)) return A("소리 키우기", "🔊", "음량을 올립니다", "VOL_UP");
    if (/(소리|음량|볼륨)/.test(s) && /(줄|낮|내|작)/.test(s)) return A("소리 줄이기", "🔉", "음량을 내립니다", "VOL_DOWN");
    if (num && /(채널|번)/.test(s)) return A(num + "번", "📺", num + "번 채널로 이동", "CH_NUM", "ok", num);
    if (/채널/.test(s) && /(다음|올|위|넘|다음거)/.test(s)) return A("다음 채널", "📺", "채널을 올립니다", "CH_UP");
    if (/채널/.test(s) && /(이전|내|아래|뒤|전거)/.test(s)) return A("이전 채널", "📺", "채널을 내립니다", "CH_DOWN");
    if (/유튜브|유투브/.test(s)) return A("유튜브", "▶️", "유튜브를 엽니다", "APP", "ok", "youtube");
    if (/넷플릭스|넷플/.test(s)) return A("넷플릭스", "▶️", "넷플릭스를 엽니다", "APP", "ok", "netflix");
    if (/뉴스/.test(s)) return A("뉴스", "📰", "TV를 켭니다", "APP", "ok", "tv");
    if (/노래방|노래/.test(s)) return A("노래방", "🎤", "노래방을 켭니다", null);
    if (/채널/.test(s)) return A("다음 채널", "📺", "채널을 올립니다", "CH_UP");
    if (/(켜)/.test(s)) return A("전원 켜기", "⏻", "TV를 켭니다", "POWER_ON");
    if (/(꺼|끄)/.test(s)) return A("전원 끄기", "⏻", "TV를 끕니다", "POWER_OFF");
    return A("잘 못 들었어요", "❓", "다시 한 번 말씀해 주세요", null, "unknown");
  }
  window.__parseIntent = parseIntent; // 테스트용

  var BTN = {
    POWER: A("전원 끄기", "⏻", "TV를 끕니다", "POWER_OFF"),
    CH_UP: A("다음 채널", "📺", "채널을 올립니다", "CH_UP"),
    CH_DOWN: A("이전 채널", "📺", "채널을 내립니다", "CH_DOWN"),
    VOL_UP: A("소리 키우기", "🔊", "음량을 올립니다", "VOL_UP"),
    VOL_DOWN: A("소리 줄이기", "🔉", "음량을 내립니다", "VOL_DOWN"),
    MUTE: A("음소거", "🔇", "소리를 끕니다", "MUTE"),
    HOME: A("홈 / 앱 목록", "🏠", "홈 화면을 엽니다", null)
  };

  var screen = document.getElementById("screen");
  var scIcon = document.getElementById("scIcon"), scLabel = document.getElementById("scLabel");
  var scDetail = document.getElementById("scDetail"), scHeard = document.getElementById("scHeard");

  // 명령 카테고리 칩
  function catLabel(act) {
    if (!act) return "명령";
    if (act.kind === "unknown") return "다시";
    switch (act.cmd) {
      case "VOL_UP": case "VOL_DOWN": case "MUTE": return "음량";
      case "CH_UP": case "CH_DOWN": case "CH_NUM": return "채널";
      case "POWER_OFF": case "POWER_ON": return "전원";
      case "APP": return "앱";
      default: return "명령";
    }
  }
  function flip() {
    screen.classList.remove("flip");
    void screen.offsetWidth;
    screen.classList.add("flip");
  }

  function showAction(act, heard) {
    if (!act) return;
    var sent = sendToTV(act);
    screen.className = "screen " + (act.kind === "unknown" ? "unknown" : "ok") + (sent ? " sent" : "");
    scIcon.textContent = catLabel(act);
    scLabel.textContent = act.label;
    scDetail.textContent = act.detail;
    scHeard.textContent = heard ? ("들은 말: “" + heard + "”") : "";
    flip();
  }

  // 연결된 LG TV로 실제 명령 전송. 연결 안 됐거나 미지원 명령이면 false.
  function sendToTV(act) {
    if (!tv || !tv.ready || !act || !act.cmd) return false;
    switch (act.cmd) {
      case "VOL_UP": tv.volumeUp(); return true;
      case "VOL_DOWN": tv.volumeDown(); return true;
      case "MUTE": tv.setMute(true); return true;
      case "CH_UP": tv.channelUp(); return true;
      case "CH_DOWN": tv.channelDown(); return true;
      case "CH_NUM": tv.openChannel(act.value); return true;
      case "POWER_OFF": tv.powerOff(); return true;
      case "APP": tv.launchApp(act.value); return true;
      default: return false; // POWER_ON(WoL 필요), HOME 등 미지원
    }
  }

  // 물리 버튼
  var pads = document.querySelectorAll(".pad button");
  for (var i = 0; i < pads.length; i++) {
    pads[i].addEventListener("click", function () { showAction(BTN[this.getAttribute("data-cmd")], ""); });
  }

  // ── 음성 인식 ──
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var micBtn = document.getElementById("micBtn"), micText = document.getElementById("micText");
  var rec = null, listening = false;

  if (!SR) {
    micBtn.disabled = true;
    micText.textContent = "이 브라우저는 음성 인식을 지원하지 않아요";
  } else {
    micBtn.addEventListener("click", function () { listening ? stop() : start(); });
  }

  function start() {
    rec = new SR();
    rec.lang = "ko-KR";
    rec.interimResults = true;
    rec.maxAlternatives = 1;
    var finalText = "";
    rec.onstart = function () { listening = true; micBtn.classList.add("live"); micText.textContent = "듣고 있어요… (다시 누르면 끝)"; };
    rec.onresult = function (e) {
      var interim = "";
      for (var k = e.resultIndex; k < e.results.length; k++) {
        var r = e.results[k];
        if (r.isFinal) finalText += r[0].transcript; else interim += r[0].transcript;
      }
      var heard = (finalText + interim).trim();
      if (heard) { scHeard.textContent = "들은 말: “" + heard + "”"; }
    };
    rec.onerror = function () {};
    rec.onend = function () {
      listening = false; micBtn.classList.remove("live"); micText.textContent = "눌러서 말하기";
      var heard = finalText.trim();
      if (heard) showAction(parseIntent(heard), heard);
    };
    try { rec.start(); } catch (e) {}
  }
  function stop() { if (rec) { try { rec.stop(); } catch (e) {} } }

  // ── LG TV 연결 ──
  function $(id) { return document.getElementById(id); }
  var tv = null;
  var tvState = $("tvState"), tvMsg = $("tvMsg"), tvIp = $("tvIp"), tvConnect = $("tvConnect");
  function setTvState(t, cls) { tvState.textContent = t; tvState.className = "tvstate" + (cls ? " " + cls : ""); }
  function setTvMsg(t, cls) { tvMsg.textContent = t; tvMsg.className = "tvmsg" + (cls ? " " + cls : ""); }

  tvConnect.addEventListener("click", function () {
    var ip = (tvIp.value || "").trim();
    if (!/^\d{1,3}(\.\d{1,3}){3}$/.test(ip)) { setTvMsg("IP 주소를 정확히 넣어 주세요. 예: 192.168.0.12", "err"); return; }
    setTvState("연결 중…", ""); setTvMsg("TV에 연결 중…", "");
    try { localStorage.setItem("lgtv_last_ip", ip); } catch (e) {}
    tv = new LGTV();
    tv.connect(ip, {
      onPrompt: function () { setTvState("허용 대기", ""); setTvMsg("TV 화면에 뜬 ‘허용’을 눌러 주세요.", ""); },
      onReady: function () { setTvState("연결됨", "ok"); setTvMsg("연결됐어요! 버튼·음성으로 TV를 조작해 보세요.", "ok"); try { tv.toast("또박또박 리모컨 연결됨"); } catch (e) {} },
      onError: function (m) { setTvState("연결 실패", "err"); setTvMsg(m || "연결에 실패했어요.", "err"); },
      onClose: function () { if (tv && !tv.ready) return; setTvState("연결 끊김", "err"); }
    });
  });

  try { var last = localStorage.getItem("lgtv_last_ip"); if (last) tvIp.value = last; } catch (e) {}
})();
</script>
</body>
</html>
