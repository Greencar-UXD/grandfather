<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>음성 리모컨 — 또박또박</title>
<style>
  /* ── 채널 드럼: 가구형(우드캐비닛 TV) 음성 리모컨 ──
     아이보리 플라스틱 바탕 + 갈검정 잉크로 대비 사수.
     상태색 분담: 듣는중=레드 / 인식=호박 / 전송=그린 / 전원·오류=레드. */
  :root {
    --ivory:#F2E9D8;       /* 몸체/배경 */
    --ivory-2:#EAE0CC;     /* 살짝 눌린 면 */
    --face:#FBF7EE;        /* 카드/타일 면 */
    --walnut:#3A2417;      /* 베젤/테두리 */
    --walnut-2:#4d3320;    /* 베젤 하이라이트 */
    --ink:#1A130C;         /* 본문 잉크(갈검정) */
    --ink-2:#6b5b49;       /* 보조 텍스트 */
    --ink-3:#9a8a76;       /* 약한 텍스트 */
    --amber:#E8A11C;       /* 인식 신호 */
    --red:#C42B1C;         /* 라이브/전원/오류 */
    --green:#1F7A3D;       /* 전송 확인 */
    --line:#dccfb6;        /* 옅은 분할선 */
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; }
  body {
    background:var(--ivory); color:var(--ink);
    font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding:0 16px calc(20px + env(safe-area-inset-bottom));
    max-width:560px; margin:0 auto;
  }
  .wrap { display:flex; flex-direction:column; gap:14px; }

  /* 헤더 */
  header { display:flex; align-items:center; justify-content:space-between;
    padding:18px 2px calc(4px + env(safe-area-inset-top)); }
  .brand { display:flex; align-items:center; gap:10px; font-weight:900; font-size:20px; letter-spacing:-.01em; }
  .logo { width:34px; height:26px; border:3px solid var(--walnut); border-radius:6px;
    display:flex; align-items:center; justify-content:center; background:var(--face); }
  .logo i { width:8px; height:8px; border-radius:50%; background:var(--amber); box-shadow:0 0 0 3px rgba(232,161,28,.18); }
  .badge { font-size:12.5px; font-weight:800; letter-spacing:.04em; color:var(--walnut);
    border:2px solid var(--walnut); border-radius:999px; padding:3px 10px; }

  /* 히어로: 호두나무 베젤 채널 드럼 창 */
  .drum { border:7px solid var(--walnut); border-radius:20px; padding:7px;
    background:linear-gradient(180deg,var(--walnut-2),var(--walnut));
    box-shadow:0 10px 24px rgba(58,36,23,.22), inset 0 1px 0 rgba(255,255,255,.08); }
  .screen { position:relative; overflow:hidden; background:var(--face); border-radius:13px;
    min-height:180px; padding:22px 20px 20px; text-align:center;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
  /* 좌상단 카테고리 꼭지 라벨 */
  .chip { position:absolute; top:0; left:0; background:var(--walnut); color:var(--ivory);
    font-size:14px; font-weight:800; letter-spacing:.08em; padding:6px 14px; border-radius:0 0 12px 0; }
  .screen.idle .chip { display:none; }
  .screen.unknown .chip { background:var(--red); }
  /* 명령 글씨(주인공) */
  .cmd { font-weight:900; letter-spacing:-.01em; color:var(--ink);
    font-size:clamp(38px,11vw,62px); line-height:1.08; }
  .screen.idle .cmd { font-size:clamp(24px,6.4vw,32px); color:var(--ink-2); font-weight:800; }
  .screen.unknown .cmd { color:var(--red); }
  .detail { font-size:18px; font-weight:600; color:var(--ink-2); }
  .heard { font-size:15px; color:var(--ink-3); font-weight:600; }
  .heard:empty { display:none; }
  /* 인식 표시등(호박 글로우) */
  .led { position:absolute; top:14px; right:14px; width:14px; height:14px; border-radius:50%;
    background:#d8cdb6; transition:background .15s; }
  .screen.ok .led { background:var(--amber); box-shadow:0 0 0 4px rgba(232,161,28,.22); animation:ledpulse .5s ease-out 1; }
  .screen.unknown .led { background:var(--red); box-shadow:0 0 0 4px rgba(196,43,28,.2); }
  @keyframes ledpulse { 0%{ box-shadow:0 0 0 0 rgba(232,161,28,.55);} 100%{ box-shadow:0 0 0 12px rgba(232,161,28,0);} }
  /* 전송 완료 그린 띠 */
  .sentband { display:none; align-items:center; justify-content:center; gap:7px;
    width:calc(100% + 40px); margin:6px -20px -20px; padding:11px;
    background:var(--green); color:#fff; font-weight:800; font-size:16px; }
  .screen.sent .sentband { display:flex; }
  .sentband svg { width:18px; height:18px; }
  /* split-flap 등장 */
  @keyframes drumflip { 0%{ transform:translateY(-12px) rotateX(-22deg); opacity:.15; } 55%{ opacity:1; } 100%{ transform:none; opacity:1; } }
  .screen.flip { animation:drumflip .22s cubic-bezier(.2,.75,.25,1); transform-origin:top center; }

  /* 눌러서 말하기 막대 */
  .mic { width:100%; min-height:96px; border:none; border-radius:18px; cursor:pointer;
    background:linear-gradient(180deg,var(--walnut-2),var(--walnut)); color:var(--ivory);
    font-size:23px; font-weight:900; letter-spacing:-.01em;
    display:flex; align-items:center; justify-content:center; gap:14px; position:relative;
    box-shadow:0 6px 16px rgba(58,36,23,.2); }
  .mic:active { transform:translateY(1px); }
  .mic svg { width:30px; height:30px; }
  .mic .tally { display:none; width:13px; height:13px; border-radius:50%; background:var(--red); }
  .mic.live { background:linear-gradient(180deg,#5a2018,#46160f); }
  .mic.live .tally { display:inline-block; animation:blink 1s steps(2,jump-none) infinite; }
  @keyframes blink { 50%{ opacity:.25; } }
  .mic .level { display:none; align-items:flex-end; gap:4px; height:26px; margin-left:2px; }
  .mic.live .level { display:flex; }
  .mic .level i { width:5px; height:8px; background:var(--amber); border-radius:2px; animation:vu .9s ease-in-out infinite; }
  .mic .level i:nth-child(2){ animation-delay:.15s; } .mic .level i:nth-child(3){ animation-delay:.3s; } .mic .level i:nth-child(4){ animation-delay:.45s; }
  @keyframes vu { 0%,100%{ height:7px; } 50%{ height:24px; } }

  /* 채널 번호판 — 큰 버튼 그리드 */
  .pad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .pad button { background:var(--face); border:2px solid var(--walnut); border-radius:15px;
    min-height:88px; padding:12px 6px; cursor:pointer; color:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px;
    font-size:18px; font-weight:800; }
  .pad button:active { background:var(--ivory-2); transform:translateY(1px); }
  .pad button svg { width:30px; height:30px; }
  .pad button.power { color:var(--red); border-color:var(--red); }
  .pad button.wide { grid-column:1 / -1; flex-direction:row; min-height:64px; gap:12px; font-size:19px; }

  /* LG TV 연결 — 계기판 서랍 */
  .tvbox { background:var(--face); border:2px solid var(--walnut); border-radius:15px; overflow:hidden; }
  .tvhead { display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:13px 15px; font-weight:800; font-size:16px; }
  .tvhead .ttl { display:flex; align-items:center; gap:8px; }
  .tvhead svg { width:20px; height:20px; }
  .beta { font-size:11px; font-weight:800; letter-spacing:.03em; color:var(--walnut);
    border:1.5px solid var(--walnut); border-radius:999px; padding:1px 7px; }
  .tvstate { font-size:13px; font-weight:800; color:var(--ink-3); }
  .tvstate.ok { color:var(--green); } .tvstate.err { color:var(--red); }
  .tvbody { padding:14px 15px 16px; border-top:2px solid var(--line); }
  .tvhelp { font-size:14px; line-height:1.55; color:var(--ink-2); margin:0 0 12px; }
  .tvhelp b { color:var(--ink); }
  .tvrow { display:flex; gap:8px; }
  .tvip { flex:1 1 auto; min-width:0; font:inherit; font-size:19px; font-weight:700; font-variant-numeric:tabular-nums;
    padding:12px; border:2px solid var(--line); border-radius:11px; background:#fff; color:var(--ink); }
  .tvip:focus { outline:none; border-color:var(--amber); }
  .tvbtn { flex:0 0 auto; white-space:nowrap; border:none; background:var(--walnut); color:var(--ivory); font-weight:800; font-size:17px;
    padding:0 22px; border-radius:11px; cursor:pointer; }
  .tvbtn:active { background:#2c1b11; }
  .tvmsg { font-size:14px; font-weight:600; margin-top:11px; min-height:18px; color:var(--ink-2); }
  .tvmsg.ok { color:var(--green); font-weight:800; } .tvmsg.err { color:var(--red); font-weight:800; }

  footer { text-align:center; padding:6px 0 2px; }
  footer a { color:var(--ink-3); font-size:15px; font-weight:700; text-decoration:none; }

  :focus-visible { outline:3px solid var(--amber); outline-offset:2px; border-radius:6px; }
  .pad button.power:focus-visible, .mic:focus-visible { outline-color:var(--ink); }

  @media (prefers-reduced-motion: reduce) {
    .screen.flip { animation:none; }
    .screen.ok .led { animation:none; }
    .mic.live .tally { animation:none; }
    .mic .level i { animation:none; height:14px; }
    .mic:active, .pad button:active { transform:none; }
  }
</style>
</head>
<body>
  <header>
    <span class="brand"><span class="logo"><i></i></span>음성 리모컨</span>
    <span class="badge">시제품</span>
  </header>

  <div class="wrap">
    <!-- 히어로: 채널 드럼 창 -->
    <div class="drum">
      <div class="screen idle" id="screen">
        <span class="chip" id="scIcon">명령</span>
        <div class="cmd" id="scLabel">버튼을 누르고 말해보세요</div>
        <div class="detail" id="scDetail">예: “소리 키워줘”, “다음 채널”, “유튜브 틀어줘”</div>
        <div class="heard" id="scHeard"></div>
        <div class="sentband" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>TV로 보냄
        </div>
        <span class="led" aria-hidden="true"></span>
      </div>
    </div>

    <!-- 눌러서 말하기 -->
    <button class="mic" id="micBtn" type="button">
      <span class="tally" aria-hidden="true"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
      <span id="micText">눌러서 말하기</span>
      <span class="level" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
    </button>

    <!-- 채널 번호판 -->
    <div class="pad">
      <button class="power" data-cmd="POWER" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v9"/><path d="M6.6 6.6a8 8 0 1 0 10.8 0"/></svg>전원</button>
      <button data-cmd="CH_UP" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="7.5" width="19" height="12" rx="2"/><path d="M8 4l4-2 4 2"/><path d="M12 10v6M9 13h6"/></svg>채널 +</button>
      <button data-cmd="VOL_UP" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9.5v5h3.5L13 19V5L7.5 9.5H4z"/><path d="M16.5 8.5a5 5 0 0 1 0 7"/><path d="M19 6a9 9 0 0 1 0 12"/></svg>소리 +</button>
      <button data-cmd="MUTE" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9.5v5h3.5L13 19V5L7.5 9.5H4z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>음소거</button>
      <button data-cmd="CH_DOWN" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="7.5" width="19" height="12" rx="2"/><path d="M8 4l4-2 4 2"/><path d="M9 13h6"/></svg>채널 −</button>
      <button data-cmd="VOL_DOWN" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9.5v5h3.5L13 19V5L7.5 9.5H4z"/><path d="M16.5 8.5a5 5 0 0 1 0 7"/></svg>소리 −</button>
      <button class="wide" data-cmd="HOME" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>홈 / 앱 목록</button>
    </div>

    <!-- LG TV 연결 -->
    <div class="tvbox" id="tvbox">
      <div class="tvhead">
        <span class="ttl">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="5" width="19" height="13" rx="2"/><path d="M8 21h8"/></svg>
          LG TV 연결 <span class="beta">베타</span>
        </span>
        <span class="tvstate" id="tvState">연결 안 됨</span>
      </div>
      <div class="tvbody" id="tvBody">
        <p class="tvhelp">실제 TV 제어는 <b>또박또박 앱</b>에서, TV와 <b>같은 와이파이</b>일 때 동작해요.
          TV의 IP는 LG TV의 <b>설정 → 네트워크</b>에서 볼 수 있어요.</p>
        <div class="tvrow">
          <input id="tvIp" class="tvip" type="text" inputmode="decimal" autocomplete="off" placeholder="예: 192.168.0.12" aria-label="TV IP 주소">
          <button id="tvConnect" class="tvbtn" type="button">연결</button>
        </div>
        <div class="tvmsg" id="tvMsg"></div>
      </div>
    </div>

    <footer><a href="./">← 또박또박으로</a></footer>
  </div>

<script src="lg-webos.js"></script>
<script>
(function () {
  "use strict";

  // ── 한국어 음성 명령 → 의도(intent) 파서 ──
  function A(label, icon, detail, cmd, kind, value) {
    return { label: label, icon: icon, detail: detail, cmd: cmd || null, kind: kind || "ok", value: value };
  }
  function parseIntent(raw) {
    var s = (raw || "").replace(/\s+/g, "");
    if (!s) return null;
    var num = (s.match(/(\d+)\s*번/) || s.match(/(\d+)/) || [])[1];
    if (/(음소거|무음|소리꺼|소리끄|조용)/.test(s)) return A("음소거", "🔇", "소리를 끕니다", "MUTE");
    if (/(소리|음량|볼륨)/.test(s) && /(키|높|올|크)/.test(s)) return A("소리 키우기", "🔊", "음량을 올립니다", "VOL_UP");
    if (/(소리|음량|볼륨)/.test(s) && /(줄|낮|내|작)/.test(s)) return A("소리 줄이기", "🔉", "음량을 내립니다", "VOL_DOWN");
    if (num && /(채널|번)/.test(s)) return A(num + "번", "📺", num + "번 채널로 이동", "CH_NUM", "ok", num);
    if (/채널/.test(s) && /(다음|올|위|넘|다음거)/.test(s)) return A("다음 채널", "📺", "채널을 올립니다", "CH_UP");
    if (/채널/.test(s) && /(이전|내|아래|뒤|전거)/.test(s)) return A("이전 채널", "📺", "채널을 내립니다", "CH_DOWN");
    if (/유튜브|유투브/.test(s)) return A("유튜브", "▶️", "유튜브를 엽니다", "APP", "ok", "youtube");
    if (/넷플릭스|넷플/.test(s)) return A("넷플릭스", "▶️", "넷플릭스를 엽니다", "APP", "ok", "netflix");
    if (/뉴스/.test(s)) return A("뉴스", "📰", "TV를 켭니다", "APP", "ok", "tv");
    if (/노래방|노래/.test(s)) return A("노래방", "🎤", "노래방을 켭니다", null);
    if (/채널/.test(s)) return A("다음 채널", "📺", "채널을 올립니다", "CH_UP");
    if (/(켜)/.test(s)) return A("전원 켜기", "⏻", "TV를 켭니다", "POWER_ON");
    if (/(꺼|끄)/.test(s)) return A("전원 끄기", "⏻", "TV를 끕니다", "POWER_OFF");
    return A("잘 못 들었어요", "❓", "다시 한 번 말씀해 주세요", null, "unknown");
  }
  window.__parseIntent = parseIntent; // 테스트용

  var BTN = {
    POWER: A("전원 끄기", "⏻", "TV를 끕니다", "POWER_OFF"),
    CH_UP: A("다음 채널", "📺", "채널을 올립니다", "CH_UP"),
    CH_DOWN: A("이전 채널", "📺", "채널을 내립니다", "CH_DOWN"),
    VOL_UP: A("소리 키우기", "🔊", "음량을 올립니다", "VOL_UP"),
    VOL_DOWN: A("소리 줄이기", "🔉", "음량을 내립니다", "VOL_DOWN"),
    MUTE: A("음소거", "🔇", "소리를 끕니다", "MUTE"),
    HOME: A("홈 / 앱 목록", "🏠", "홈 화면을 엽니다", null)
  };

  var screen = document.getElementById("screen");
  var scIcon = document.getElementById("scIcon"), scLabel = document.getElementById("scLabel");
  var scDetail = document.getElementById("scDetail"), scHeard = document.getElementById("scHeard");

  // 명령 카테고리 꼭지 라벨(방송 슈퍼 느낌)
  function catLabel(act) {
    if (!act) return "명령";
    if (act.kind === "unknown") return "다시";
    switch (act.cmd) {
      case "VOL_UP": case "VOL_DOWN": case "MUTE": return "음량";
      case "CH_UP": case "CH_DOWN": case "CH_NUM": return "채널";
      case "POWER_OFF": case "POWER_ON": return "전원";
      case "APP": return "앱";
      default: return "명령";
    }
  }
  // 채널 드럼 split-flap 재시작
  function flip() {
    screen.classList.remove("flip");
    void screen.offsetWidth;
    screen.classList.add("flip");
  }

  function showAction(act, heard) {
    if (!act) return;
    var sent = sendToTV(act);
    screen.className = "screen " + (act.kind === "unknown" ? "unknown" : "ok") + (sent ? " sent" : "");
    scIcon.textContent = catLabel(act);
    scLabel.textContent = act.label;
    scDetail.textContent = act.detail;
    scHeard.textContent = heard ? ("들은 말: “" + heard + "”") : "";
    flip();
  }

  // 연결된 LG TV로 실제 명령 전송. 연결 안 됐거나 미지원 명령이면 false.
  function sendToTV(act) {
    if (!tv || !tv.ready || !act || !act.cmd) return false;
    switch (act.cmd) {
      case "VOL_UP": tv.volumeUp(); return true;
      case "VOL_DOWN": tv.volumeDown(); return true;
      case "MUTE": tv.setMute(true); return true;
      case "CH_UP": tv.channelUp(); return true;
      case "CH_DOWN": tv.channelDown(); return true;
      case "CH_NUM": tv.openChannel(act.value); return true;
      case "POWER_OFF": tv.powerOff(); return true;
      case "APP": tv.launchApp(act.value); return true;
      default: return false; // POWER_ON(WoL 필요), HOME 등 미지원
    }
  }

  // 물리 버튼
  var pads = document.querySelectorAll(".pad button");
  for (var i = 0; i < pads.length; i++) {
    pads[i].addEventListener("click", function () { showAction(BTN[this.getAttribute("data-cmd")], ""); });
  }

  // ── 음성 인식 ──
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var micBtn = document.getElementById("micBtn"), micText = document.getElementById("micText");
  var rec = null, listening = false;

  if (!SR) {
    micBtn.disabled = true;
    micText.textContent = "이 브라우저는 음성 인식을 지원하지 않아요";
  } else {
    micBtn.addEventListener("click", function () { listening ? stop() : start(); });
  }

  function start() {
    rec = new SR();
    rec.lang = "ko-KR";
    rec.interimResults = true;
    rec.maxAlternatives = 1;
    var finalText = "";
    rec.onstart = function () { listening = true; micBtn.classList.add("live"); micText.textContent = "듣고 있어요… (다시 누르면 끝)"; };
    rec.onresult = function (e) {
      var interim = "";
      for (var k = e.resultIndex; k < e.results.length; k++) {
        var r = e.results[k];
        if (r.isFinal) finalText += r[0].transcript; else interim += r[0].transcript;
      }
      var heard = (finalText + interim).trim();
      if (heard) { scHeard.textContent = "들은 말: “" + heard + "”"; }
    };
    rec.onerror = function () {};
    rec.onend = function () {
      listening = false; micBtn.classList.remove("live"); micText.textContent = "눌러서 말하기";
      var heard = finalText.trim();
      if (heard) showAction(parseIntent(heard), heard);
    };
    try { rec.start(); } catch (e) {}
  }
  function stop() { if (rec) { try { rec.stop(); } catch (e) {} } }

  // ── LG TV 연결 ──
  function $(id) { return document.getElementById(id); }
  var tv = null;
  var tvState = $("tvState"), tvMsg = $("tvMsg"), tvIp = $("tvIp"), tvConnect = $("tvConnect");
  function setTvState(t, cls) { tvState.textContent = t; tvState.className = "tvstate" + (cls ? " " + cls : ""); }
  function setTvMsg(t, cls) { tvMsg.textContent = t; tvMsg.className = "tvmsg" + (cls ? " " + cls : ""); }

  tvConnect.addEventListener("click", function () {
    var ip = (tvIp.value || "").trim();
    if (!/^\d{1,3}(\.\d{1,3}){3}$/.test(ip)) { setTvMsg("IP 주소를 정확히 넣어 주세요. 예: 192.168.0.12", "err"); return; }
    setTvState("연결 중…", ""); setTvMsg("TV에 연결 중…", "");
    try { localStorage.setItem("lgtv_last_ip", ip); } catch (e) {}
    tv = new LGTV();
    tv.connect(ip, {
      onPrompt: function () { setTvState("허용 대기", ""); setTvMsg("📺 TV 화면에 뜬 ‘허용’을 눌러 주세요.", ""); },
      onReady: function () { setTvState("연결됨", "ok"); setTvMsg("연결됐어요! 버튼·음성으로 TV를 조작해 보세요.", "ok"); try { tv.toast("또박또박 리모컨 연결됨"); } catch (e) {} },
      onError: function (m) { setTvState("연결 실패", "err"); setTvMsg(m || "연결에 실패했어요.", "err"); },
      onClose: function () { if (tv && !tv.ready) return; setTvState("연결 끊김", "err"); }
    });
  });

  try { var last = localStorage.getItem("lgtv_last_ip"); if (last) tvIp.value = last; } catch (e) {}
})();
</script>
</body>
</html>
