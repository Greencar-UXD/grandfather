name: Deploy to GitHub Pages

# main에 push될 때 자동 배포. (저장소 Settings에서 Pages source를
# "GitHub Actions"로 두면 이 워크플로가 사이트를 배포합니다.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 배포
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pages가 아직 켜져 있지 않으면 자동으로 켭니다 (enablement: true)
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
