<!-- PWA: 설치형 앱 (홈 화면에 추가) -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
  :root {
    --bg: #f4f6f9;
    --bg-press: #e9edf3;   /* 버튼 눌렀을 때 옅은 회색 */
    --ink: #11151c;        /* 본문 글씨 (최대 대비) */
    --ink-2: #5a626e;      /* 보조 텍스트 */
    --ink-3: #8a92a0;      /* 가장 약한 보조 텍스트 */
    --card: #ffffff;
    --line: #e3e7ee;
    --brand: #0b66ff;      /* 듣기 시작 (파랑) */
    --brand-press: #0a52cc;/* 파란 버튼 누름 */
    --stop: #e23b3b;       /* 말 끝 (빨강) */
    --stop-press: #c12b2b; /* 빨간 버튼 누름 */
    --ok: #1f8a4c;         /* 완료(초록) */
    --disabled: #aeb6c2;   /* 비활성 버튼 */
    /* 오류 안내 박스 색 */
    --danger-bg: #fff5f5;
    --danger-line: #f4c9c9;
    --danger-ink: #9a2727;
    --danger-ink-strong: #7e1d1d;
    --fs: 40px;            /* 읽기 영역 기본 글씨 크기 (조절됨) */
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Pretendard Variable", "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system, sans-serif;
    line-height: 1.5; -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
    /* 안전영역(노치) 대응 */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overscroll-behavior: none; user-select: none;
  }

  /* ── 상단 바 ── */
  header {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--card);
  }
  header .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 18px; letter-spacing: -0.4px; }
  header .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ink-2); flex: 0 0 auto; transition: background .2s; }
  body.listening header .brand .dot { background: var(--stop); animation: blink 1s steps(2, start) infinite; }
  @keyframes blink { 50% { opacity: .25; } }

  /* 글씨 크기 조절 */
  .fontctl { display: flex; align-items: center; gap: 6px; }
  .fontctl button {
    font: inherit; font-weight: 800; font-size: 18px; width: 44px; height: 44px;
    border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 12px; cursor: pointer;
  }
  .fontctl button:active { background: var(--bg-press); }
  .fontctl .lbl { font-size: 13px; color: var(--ink-2); }

  /* ── 읽기 영역 (할아버지가 보는 큰 글씨) ── */
  main {
    flex: 1 1 auto; min-height: 0; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 22px 22px 8px; display: flex; flex-direction: column;
  }
  #screen {
    flex: 1 1 auto; display: flex; align-items: center; justify-content: center;
    text-align: center; word-break: keep-all; overflow-wrap: anywhere;
  }
  #text {
    font-size: var(--fs); font-weight: 700; line-height: 1.45; letter-spacing: -0.5px;
    color: var(--ink); white-space: pre-wrap; max-width: 920px;
  }
  /* 듣는 중 아직 확정 안 된 말은 흐리게 */
  #text .interim { color: var(--ink-2); font-weight: 600; }
  /* 안내 문구(처음/대기 상태) */
  #text.placeholder { color: var(--ink-2); font-weight: 600; font-size: calc(var(--fs) * 0.62); }

  .status { flex: 0 0 auto; text-align: center; font-size: 16px; color: var(--ink-2); min-height: 22px; padding: 4px 0 2px; }
  body.listening .status { color: var(--stop); font-weight: 700; }
  .status.done { color: var(--ok); font-weight: 700; }   /* 다 적었을 때 초록으로 긍정 마무리 */

  /* ── 하단 큰 버튼 ── */
  footer { flex: 0 0 auto; padding: 14px 18px calc(18px + env(safe-area-inset-bottom)); }
  #mainBtn {
    width: 100%; min-height: 92px; border: none; border-radius: 22px;
    font-family: inherit; font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
    color: #fff; background: var(--brand); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    box-shadow: 0 6px 20px rgba(11,102,255,.28); transition: transform .06s, background .15s;
  }
  #mainBtn .ico { font-size: 30px; line-height: 1; display: inline-flex; }
  .ico-svg { width: 1em; height: 1em; display: inline-block; vertical-align: -0.14em; flex: none; }
  #mainBtn:active { transform: scale(.985); background: var(--brand-press); }
  body.listening #mainBtn { background: var(--stop); box-shadow: 0 6px 20px rgba(226,59,59,.32); }
  body.listening #mainBtn:active { background: var(--stop-press); }
  #mainBtn:disabled { background: var(--disabled); box-shadow: none; cursor: default; }

  /* 듣는 중 펄스 표시 */
  .pulse { display: inline-flex; align-items: center; gap: 5px; }
  .pulse i { width: 6px; height: 20px; background: rgba(255,255,255,.9); border-radius: 3px; animation: eq 1s ease-in-out infinite; }
  .pulse i:nth-child(2){ animation-delay:.15s } .pulse i:nth-child(3){ animation-delay:.3s }
  /* 실제 마이크 입력에 반응하는 동안엔 CSS 자동 애니메이션을 끄고 JS로 높이를 준다 */
  .pulse.live i { animation: none; will-change: transform; }
  @keyframes eq { 0%,100%{ transform: scaleY(.4) } 50%{ transform: scaleY(1) } }

  /* 보조 버튼 (지우기) */
  .sub { display: flex; justify-content: center; margin-top: 12px; }
  .sub button {
    font: inherit; font-size: 16px; font-weight: 700; color: var(--ink-2);
    background: transparent; border: none; padding: 8px 14px; cursor: pointer; border-radius: 10px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .sub button .ico-svg { width: 18px; height: 18px; }
  .sub button:active { background: var(--bg-press); }
  .sub button[hidden] { display: none; }

  /* 미지원/오류 안내 박스 */
  .notice {
    margin: 0 18px 12px; padding: 14px 16px; border-radius: 14px;
    background: var(--danger-bg); border: 1px solid var(--danger-line); color: var(--danger-ink); font-size: 16px; line-height: 1.55;
  }
  .notice[hidden] { display: none; }
  .notice b { color: var(--danger-ink-strong); }

  /* ── 앱 내 브라우저(카톡/문자) 전체 화면 안내 ── */
  .inapp-ov { position: fixed; inset: 0; z-index: 1000; background: rgba(17,21,28,.55);
    display: flex; align-items: center; justify-content: center; padding: 20px; overflow: auto; }
  .inapp-ov[hidden] { display: none; }
  .inapp-card { background: #fff; border-radius: 24px; max-width: 460px; width: 100%;
    padding: 30px 24px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.32); }
  .inapp-emoji { font-size: 56px; line-height: 1; color: var(--brand); }
  .inapp-title { font-size: 31px; font-weight: 900; color: var(--ink); margin-top: 10px; }
  .inapp-desc { font-size: 19px; font-weight: 600; line-height: 1.65; color: var(--ink-2); margin-top: 14px; }
  .inapp-desc b { color: var(--brand); }
  .inapp-primary { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 24px; font: inherit; font-size: 23px;
    font-weight: 900; color: #fff; background: var(--brand); border: none; border-radius: 18px; padding: 19px; cursor: pointer; }
  .inapp-primary .ico-svg { width: 24px; height: 24px; }
  .inapp-secondary { display: block; width: 100%; margin-top: 10px; font: inherit; font-size: 18px;
    font-weight: 800; color: var(--brand); background: #fff; border: 2px solid var(--brand); border-radius: 16px; padding: 15px; cursor: pointer; }
  .inapp-hint { font-size: 15px; line-height: 1.55; color: var(--ink-2); margin-top: 20px;
    background: var(--bg); border-radius: 12px; padding: 12px 14px; }
  .inapp-hint b { color: var(--ink); }
  .inapp-stay { margin-top: 16px; font: inherit; font-size: 15px; color: var(--ink-3);
    background: none; border: none; text-decoration: underline; cursor: pointer; }

  /* ── 하단 광고 자리 (AdSense) ── 메인 읽기 화면은 건드리지 않고 맨 아래에만.
     광고 ID가 설정되기 전에는 #adSlot이 hidden이라 화면에 전혀 안 보인다. */
  #adSlot { flex: 0 0 auto; display: flex; justify-content: center; align-items: center;
    min-height: 50px; padding: 4px 0 calc(4px + env(safe-area-inset-bottom));
    background: var(--card); border-top: 1px solid var(--line); overflow: hidden; }
  #adSlot[hidden] { display: none; }

  @media (min-width: 700px) {
    :root { --fs: 52px; }
    header .brand { font-size: 20px; }
  }
</style>
</head>
<body>
  <div class="inapp-ov" id="inappBar" hidden>
    <div class="inapp-card">
      <div class="inapp-emoji"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 11 18-5v12L3 14z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg></div>
      <div class="inapp-title">크롬에서 열어 주세요</div>
      <div class="inapp-desc">지금은 <b>카카오톡 안 화면</b>이라<br>말할 때마다 마이크 허용을 물어봐요.<br><b>크롬</b>에서 열면 처음 한 번만 물어봅니다.</div>
      <button id="openChrome" class="inapp-primary" type="button"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18"/></svg><span>크롬에서 열기</span></button>
      <button id="copyUrl" class="inapp-secondary" type="button">주소 복사하기</button>
      <div class="inapp-hint">안 열리면: 화면 오른쪽 위 <b>⋮</b> 메뉴 → <b>“다른 브라우저로 열기”</b></div>
      <button id="inappStay" class="inapp-stay" type="button">그냥 여기서 볼게요</button>
    </div>
  </div>

  <header>
    <div class="brand"><span class="dot" aria-hidden="true"></span>또박또박</div>
    <div class="fontctl" role="group" aria-label="글씨 크기 조절">
      <span class="lbl">글씨</span>
      <button id="fontDown" aria-label="글씨 작게" type="button">가&minus;</button>
      <button id="fontUp" aria-label="글씨 크게" type="button">가&plus;</button>
    </div>
  </header>

  <div class="notice" id="notice" hidden></div>

  <main>
    <div id="screen">
      <div id="text" class="placeholder" aria-live="polite" aria-atomic="true">아래 파란 버튼을 누르고 또박또박 말씀해 주세요.</div>
    </div>
    <div class="status" id="status">&nbsp;</div>
  </main>

  <footer>
    <button id="mainBtn" type="button" aria-label="말하기 시작">
      <span class="ico" aria-hidden="true"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" stroke="none"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg></span><span id="btnLabel">눌러서 말하기</span>
    </button>
    <div class="sub">
      <button id="clearBtn" type="button" hidden><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m7 21-4-4a2 2 0 0 1 0-3l9-9a2 2 0 0 1 3 0l4 4a2 2 0 0 1 0 3l-7 7"/><path d="M21 21H8"/><path d="m5 11 6 6"/></svg><span>화면 지우기</span></button>
    </div>
  </footer>

  <!-- 하단 광고 자리: AdSense 게시자 ID를 넣기 전엔 숨김 상태 -->
  <aside id="adSlot" hidden aria-label="광고"></aside>

<script>
(function () {
  "use strict";

  // ── DOM ──
  var body     = document.body;
  var textEl   = document.getElementById("text");
  var statusEl = document.getElementById("status");
  var mainBtn  = document.getElementById("mainBtn");
  var btnLabel = document.getElementById("btnLabel");
  var btnIco   = mainBtn.querySelector(".ico");
  var clearBtn = document.getElementById("clearBtn");
  var noticeEl = document.getElementById("notice");
  var fontUp   = document.getElementById("fontUp");
  var fontDown = document.getElementById("fontDown");

  var PLACEHOLDER = "아래 파란 버튼을 누르고 또박또박 말씀해 주세요.";

  // ── 카카오톡/문자 등 '앱 내 브라우저'(웹뷰)에서 열면 마이크 권한이 매번 반복되거나 막힌다.
  //    감지되면 크롬으로 열도록 안내 배너를 띄운다. (음성인식 지원 여부보다 먼저 실행) ──
  (function setupInApp() {
    var ua = navigator.userAgent || "";
    var inApp = /KAKAOTALK/i.test(ua) ||
                /FBAN|FBAV|FB_IAB|Instagram|Line\/|NAVER|DaumApps|; wv\)/i.test(ua);
    if (!inApp) return;
    var bar = document.getElementById("inappBar");
    if (bar) bar.hidden = false;
    var openBtn = document.getElementById("openChrome");
    var copyBtn = document.getElementById("copyUrl");
    var stayBtn = document.getElementById("inappStay");

    // 앱 내 브라우저(웹뷰)는 마이크 권한을 기억하지 못해 매번 물어본다. (웹 코드로는 못 막음)
    // → 외부 브라우저(크롬/사파리)로 빠져나가게 한다. 반드시 사용자 '탭' 안에서 실행해야 동작.
    function openExternal() {
      var u = location.href;
      if (/KAKAOTALK/i.test(ua)) {                       // 카카오톡: 안드로이드·iOS 공통 (기본 브라우저로 열림)
        location.href = "kakaotalk://web/openExternal?url=" + encodeURIComponent(u); return;
      }
      if (/Line\//i.test(ua)) {                          // 라인: 공식 파라미터
        location.href = u + (u.indexOf("?") !== -1 ? "&" : "?") + "openExternalBrowser=1"; return;
      }
      if (/android/i.test(ua)) {                         // 안드로이드 일반 웹뷰 → 크롬으로 강제
        var hp = location.host + location.pathname + location.search;
        location.href = "intent://" + hp + "#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" + encodeURIComponent(u) + ";end";
        return;
      }
      // iOS 기타 인앱(인스타/페북 등)은 강제 전환이 막혀 있다 → 수동 안내를 강조
      var hint = bar && bar.querySelector(".inapp-hint");
      if (hint) { hint.style.background = "#fff3cd"; hint.innerHTML = "이 앱에서는 자동으로 못 열어요.<br>오른쪽 위 <b>공유/메뉴</b> → <b>“기본 브라우저(사파리)로 열기”</b><br>또는 아래 <b>주소 복사</b> 후 사파리에 붙여넣기"; }
    }

    if (openBtn) openBtn.addEventListener("click", openExternal);
    if (copyBtn) copyBtn.addEventListener("click", function () {
      var u = location.href;
      var done = function () { copyBtn.textContent = "복사됐어요 — 크롬에 붙여넣기"; };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(u).then(done, function () { window.prompt("이 주소를 길게 눌러 복사하세요", u); });
      } else { window.prompt("이 주소를 길게 눌러 복사하세요", u); }
    });
    if (stayBtn) stayBtn.addEventListener("click", function () { if (bar) bar.hidden = true; });
  })();

  // ── 글씨 크기 (기억) ──
  var FS_MIN = 26, FS_MAX = 84, FS_STEP = 6;
  function loadFs() {
    var v = parseInt(localStorage.getItem("ttbk_fs"), 10);
    return (v >= FS_MIN && v <= FS_MAX) ? v : (window.innerWidth >= 700 ? 52 : 40);
  }
  function applyFs(v) {
    v = Math.max(FS_MIN, Math.min(FS_MAX, v));
    document.documentElement.style.setProperty("--fs", v + "px");
    try { localStorage.setItem("ttbk_fs", String(v)); } catch (e) {}
    fontDown.disabled = (v <= FS_MIN);
    fontUp.disabled   = (v >= FS_MAX);
    return v;
  }
  var fs = applyFs(loadFs());
  fontUp.addEventListener("click", function () { fs = applyFs(fs + FS_STEP); });
  fontDown.addEventListener("click", function () { fs = applyFs(fs - FS_STEP); });

  // ── 음성인식 지원 확인 ──
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showNotice(
      "<b>이 브라우저는 음성 인식을 지원하지 않아요.</b><br>" +
      "안드로이드는 <b>크롬</b>, 아이폰은 <b>사파리</b>로 열어 주세요. " +
      "(컴퓨터는 크롬 추천)"
    );
    mainBtn.disabled = true;
    btnLabel.textContent = "사용할 수 없어요";
    return;
  }

  // ── 상태 ──
  var recognition = null;
  var listening   = false;   // 사용자가 "말하기"를 눌러 듣는 중인지
  var finalText   = "";      // 확정된 문장(누적, 세션 경계에서만 합쳐짐)
  var sessionFinal = "";     // 현재 인식 세션에서 확정된 말(매 이벤트 다시 계산)
  var interimText = "";      // 아직 확정 안 된 말
  var lastCommitted = "";    // 직전 세션에서 finalText에 합친 말 — 재시작 시 중복 보고 제거용
  var lastCommittedAt = 0;   // 그 시각(ms). 재시작 직후 짧은 창에서만 중복 보고를 제거하기 위함
  var guardArmed  = false;   // 세션 시작 직후 중복-보고 제거 가드 활성 여부
  var starting    = false;   // start() 처리 중 버튼 재진입(더블탭) 차단
  var micReady    = false;   // getUserMedia로 마이크 권한을 한 번 확보했는지(안드로이드 반복 허용창 방지)
  var REPLAY_WINDOW_MS = 1500; // 재시작 후 이 시간 안에 같은 말이 다시 오면 '플랫폼 재보고'로 보고 제거(그 이후엔 사용자가 일부러 반복한 것으로 보고 통과)
  var isAndroid = /android/i.test(navigator.userAgent || ""); // 안드로이드 Chrome은 Web Speech 중복 보고가 심함
  var DEBUG = (location.search || "").indexOf("debug=1") !== -1; // ?debug=1 이면 실제 인식 이벤트를 화면에 기록

  function showNotice(html) { noticeEl.innerHTML = html; noticeEl.hidden = false; }
  function hideNotice()     { noticeEl.hidden = true; }
  function setStatus(s)     { statusEl.classList.remove("done"); statusEl.textContent = s || " "; }

  // ── 디버그 로그 (?debug=1) : 안드로이드 실제 인식 이벤트를 화면에 찍어 복사할 수 있게 한다 ──
  var dbgLog = [], dbgBox = null, dbgT0 = 0;
  function dbg(line) {
    if (!DEBUG) return;
    if (!dbgT0) dbgT0 = Date.now();
    dbgLog.push("+" + (Date.now() - dbgT0) + "ms  " + line);
    if (dbgLog.length > 500) dbgLog.shift();
    if (!dbgBox) {
      dbgBox = document.createElement("div");
      dbgBox.setAttribute("style", "position:fixed;left:0;right:0;bottom:0;max-height:44vh;background:#000;color:#0f0;font:12px/1.4 ui-monospace,monospace;z-index:99999;padding:6px;overflow:auto;white-space:pre-wrap;");
      var bar = document.createElement("div");
      bar.setAttribute("style", "position:sticky;top:0;background:#000;padding-bottom:6px;");
      var copy = document.createElement("button");
      copy.textContent = "로그 복사"; copy.setAttribute("style", "margin-right:8px;font-size:14px;padding:6px 10px;");
      copy.addEventListener("click", function () {
        var txt = dbgLog.join("\n");
        if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(function () { copy.textContent = "복사됨"; }, function () { window.prompt("아래를 복사하세요", txt); });
        else window.prompt("아래를 복사하세요", txt);
      });
      var clr = document.createElement("button");
      clr.textContent = "지우기"; clr.setAttribute("style", "font-size:14px;padding:6px 10px;");
      clr.addEventListener("click", function () { dbgLog.length = 0; dbgBox._pre.textContent = ""; });
      var pre = document.createElement("div");
      bar.appendChild(copy); bar.appendChild(clr);
      dbgBox.appendChild(bar); dbgBox.appendChild(pre);
      document.body.appendChild(dbgBox); dbgBox._pre = pre;
    }
    dbgBox._pre.textContent = dbgLog.join("\n");
    dbgBox.scrollTop = dbgBox.scrollHeight;
  }

  function render() {
    // 확정문(finalText) + 현재 세션 확정분(sessionFinal)을 검은 글씨로, 중간 말(interim)은 회색으로
    var solid = finalText;
    if (sessionFinal) solid = (solid ? solid + " " : "") + sessionFinal;
    var shown = (solid + (interimText ? (solid ? " " : "") + interimText : "")).trim();
    if (!shown) {
      textEl.className = "placeholder";
      textEl.textContent = listening ? "듣고 있어요. 말씀해 주세요…" : PLACEHOLDER;
      return;
    }
    textEl.className = "";
    if (interimText) {
      textEl.innerHTML = escapeHtml(solid) +
        (solid ? " " : "") +
        '<span class="interim">' + escapeHtml(interimText) + "</span>";
    } else {
      textEl.textContent = solid;
    }
    // 길어지면 항상 끝(최근 말)이 보이도록
    textEl.scrollIntoView({ block: "end", behavior: "smooth" });
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // 세션(연속 인식 한 단위)의 확정분을 finalText로 합치고, 다음 세션을 위한 중복-보고 가드를 무장한다.
  function commitSession() {
    var piece = sessionFinal.trim();
    if (piece) { finalText = (finalText + " " + piece).trim(); lastCommitted = piece; lastCommittedAt = Date.now(); dbg('commit "' + piece + '" -> final="' + finalText + '"'); }
    sessionFinal = "";
    guardArmed = true;
  }

  // ── 의문문이면 문장 끝에 물음표를 자동으로 붙임 ──
  // 음성인식(Web Speech)은 한국어 문장부호를 안 넣어 주므로 앱에서 판단한다.
  // 원칙: "정밀도 우선" — 평서문에 잘못 ?를 붙이느니 차라리 의문문 일부를 놓친다.
  var WH_WORDS = ["누구","누가","뭐","무엇","뭘","무슨","어떤","어느","어디","언제","왜","어째서","어찌","어떻게","얼마","얼마나","몇","무얼","무어"];
  var STMT_END = ["다","라","자","네","군","죠","지","데","대","마","음","거야","거든","잖아","구나","더라","더군","다고","다니까","던데","네요","군요","데요","거든요","잖아요","지요","더라고","더라고요","는데","은데"];
  function jong(ch) { var o = ch.charCodeAt(0); return (o >= 0xAC00 && o <= 0xD7A3) ? (o - 0xAC00) % 28 : -1; }
  function endsWithAny(s, arr) { for (var i = 0; i < arr.length; i++) { if (s.slice(-arr[i].length) === arr[i]) return true; } return false; }
  function hasMidJi(core) { var idx = core.indexOf("지"); while (idx !== -1) { if (idx !== core.length - 1) return true; idx = core.indexOf("지", idx + 1); } return false; }
  function looksLikeQuestion(raw) {
    var core = raw.replace(/[\s.?!…。！？]+$/, "");
    if (core.length < 2) return false;
    // -까/-까요 : 격식 의문(-ㅂ니까)은 통과, 이유의 -다니까/-으니까는 제외
    var base = null;
    if (core.slice(-2) === "까요") base = core.slice(0, -2);
    else if (core.slice(-1) === "까") base = core.slice(0, -1);
    if (base !== null) {
      if (base.slice(-1) === "니") return base.length >= 2 && jong(base.charAt(base.length - 2)) === 17; // 앞 음절 ㅂ받침
      return true;
    }
    if (core.slice(-2) === "나요") return true;
    if (core.slice(-1) === "냐" && core.slice(-2) !== "아냐") return true;
    if (["었니","았니","겠니","였니"].indexOf(core.slice(-2)) !== -1) return true;
    var sufs = ["가요", "가"]; // -ㄴ가(요): 가/가요 앞 음절이 ㄴ받침일 때 (가다의 '가요'와 구분)
    for (var i = 0; i < sufs.length; i++) {
      if (core.slice(-sufs[i].length) === sufs[i] && jong(core.charAt(core.length - sufs[i].length - 1)) === 4) return true;
    }
    if (core.slice(-2) === "래요" && jong(core.charAt(core.length - 3)) === 8) return true; // -ㄹ래요
    var hasWh = false;
    for (var k = 0; k < WH_WORDS.length; k++) { if (core.indexOf(WH_WORDS[k]) !== -1) { hasWh = true; break; } }
    // 의문사가 있고, 간접의문(-는지 등)이 아니며, 평서 종결이 아니면 의문문으로 본다
    if (hasWh && !hasMidJi(core) && !endsWithAny(core, STMT_END)) return true;
    return false;
  }
  function autoPunctuate(text) {
    var t = text.replace(/\s+$/, "");
    if (!t) return text;
    if (".?!…。！？".indexOf(t.charAt(t.length - 1)) !== -1) return t; // 이미 문장부호가 있으면 그대로
    return looksLikeQuestion(t) ? t + "?" : t;
  }

  // ── 실시간 "목소리 크기" 막대 ───────────────────────────────
  // 듣는 중 펄스 막대를 실제 마이크 입력 크기에 반응시킨다.
  // "내 목소리가 잘 들어가고 있다"를 눈으로 확인 + 목소리 크기 스스로 조절.
  // (Web Audio 미지원/권한 거부 시엔 기존 CSS 애니메이션을 그대로 둔다)
  var meter = (function () {
    var ctx = null, stream = null, analyser = null, freq = null;
    var raf = 0, pending = false, bars = null, pulseEl = null, lv = [0.2, 0.2, 0.2];

    function release() {
      if (raf) { cancelAnimationFrame(raf); raf = 0; }
      if (stream) { try { stream.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {} stream = null; }
      if (ctx) { try { ctx.close(); } catch (e) {} ctx = null; }
      analyser = null; freq = null;
      if (pulseEl) { pulseEl.classList.remove("live"); pulseEl = null; }
      bars = null;
    }

    function stop() { pending = false; release(); }

    function start(el) {
      if (raf || pending || !el) return;
      var bs = el.querySelectorAll("i");
      if (!bs || !bs.length) return;
      var AC = window.AudioContext || window.webkitAudioContext;
      var md = navigator.mediaDevices;
      if (!AC || !md || !md.getUserMedia) return;     // 못 쓰면 CSS 애니메이션 유지
      pending = true;
      md.getUserMedia({ audio: true }).then(function (s) {
        if (!pending || !body.classList.contains("listening")) {  // 그 사이 끝났으면 정리
          try { s.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {}
          pending = false; return;
        }
        pending = false;
        stream = s; pulseEl = el; bars = bs;
        ctx = new AC(); try { ctx.resume(); } catch (e) {}
        analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.6;
        ctx.createMediaStreamSource(s).connect(analyser);
        freq = new Uint8Array(analyser.frequencyBinCount);
        el.classList.add("live");                     // CSS 애니메이션 끄고 JS 구동
        loop();
      }).catch(function () { pending = false; /* 권한 실패 등 — CSS 애니메이션 유지 */ });
    }

    function loop() {
      raf = requestAnimationFrame(loop);
      if (!analyser || !bars) return;
      analyser.getByteFrequencyData(freq);
      var n = freq.length, third = Math.floor(n / 3) || 1, b, i;
      for (b = 0; b < 3; b++) {                        // 저/중/고 음역으로 3등분 → 3개 막대
        var from = b * third, to = (b === 2) ? n : (b + 1) * third, sum = 0;
        for (i = from; i < to; i++) sum += freq[i];
        var avg = sum / (to - from) / 255;             // 0~1
        var target = Math.min(1, 0.16 + avg * 2.4);    // 바닥값 + 증폭
        lv[b] += (target - lv[b]) * 0.45;              // 부드럽게
        if (bars[b]) bars[b].style.transform = "scaleY(" + lv[b].toFixed(3) + ")";
      }
    }

    return { start: start, stop: stop };
  })();

  function setMode(isListening) {
    listening = isListening;
    starting = false;          // 상태 전환 완료 → 버튼 잠금 해제
    body.classList.toggle("listening", isListening);
    if (isListening) {
      btnIco.textContent = "";
      btnIco.innerHTML = '<span class="pulse" aria-hidden="true"><i></i><i></i><i></i></span>';
      btnLabel.textContent = "말 다 했어요";
      mainBtn.setAttribute("aria-label", "말 다 했어요 (끝내기)");
      clearBtn.hidden = true;
      meter.start(btnIco.querySelector(".pulse"));     // 막대를 실제 마이크 입력에 반응시킨다
    } else {
      meter.stop();
      btnIco.innerHTML = '<svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" stroke="none"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg>';
      btnLabel.textContent = finalText ? "다시 말하기" : "눌러서 말하기";
      mainBtn.setAttribute("aria-label", "말하기 시작");
      clearBtn.hidden = !finalText;
    }
  }

  // ── 음성인식 만들기 ──
  function buildRecognition() {
    var r = new SR();
    r.lang = "ko-KR";
    // 안드로이드 Chrome은 continuous=true에서 확정 결과를 중복 보고(같은/다른 인덱스)하는 일이 잦다.
    // → 안드로이드에서는 continuous=false로 두고, 끊기면 onend에서 재시작해 이어 듣는다(누적은 finalText가 유지).
    r.continuous = !isAndroid;
    r.interimResults = true;   // 말하는 중간에도 실시간 표시

    r.onresult = function (e) {
      // resultIndex에 의존하지 않고 결과 목록 전체를 인덱스 기준으로 다시 계산한다.
      // 같은 인덱스의 확정 결과가 재보고돼도 '덮어쓰기'가 되므로 같은 말이 두 번 쌓이지 않는다.
      // (안드로이드 Chrome은 resultIndex를 0에 고정한 채 확정 결과를 재보고하는 버그가 있음)
      var finals = [], interim = "";
      for (var i = 0; i < e.results.length; i++) {
        var res = e.results[i];
        var t = (res[0] && res[0].transcript) ? res[0].transcript : "";
        if (res.isFinal) finals[i] = t.trim();
        else interim += t;
      }
      // 안드로이드: 같은 확정 문구가 (다른 인덱스로) 인접 중복되면 하나로 합친다.
      var sf;
      if (isAndroid) {
        var parts = [], prev = null;
        for (var k = 0; k < finals.length; k++) {
          var v = finals[k];
          if (!v || v === prev) continue;   // 빈 칸·직전과 동일한 확정 문구 → 중복으로 보고 건너뜀
          parts.push(v); prev = v;
        }
        sf = parts.join(" ").trim();
      } else {
        sf = finals.filter(Boolean).join(" ").trim();
      }
      if (DEBUG) {
        var raw = [];
        for (var d = 0; d < e.results.length; d++) raw.push("#" + d + (e.results[d].isFinal ? "F" : "p") + ':"' + ((e.results[d][0] && e.results[d][0].transcript) || "") + '"');
        dbg("onresult idx=" + e.resultIndex + " n=" + e.results.length + " [" + raw.join(" ") + "] => sf=\"" + sf + "\" interim=\"" + interim + "\" armed=" + guardArmed);
      }
      // 재시작 직후, 직전 세션의 확정 문장을 그대로 다시 보고하는 안드로이드 동작이면 1회만 걷어낸다.
      // 단, 재시작 직후 짧은 창(REPLAY_WINDOW_MS) 안에서만 적용한다. 그 이후의 동일 문장은
      // 사용자가 일부러 같은 말을 반복한 것으로 보고 그대로 통과시킨다(정당한 말이 삭제되는 일 방지).
      if (guardArmed && lastCommitted && sf) {
        if (Date.now() - lastCommittedAt > REPLAY_WINDOW_MS) { guardArmed = false; }  // 창 지남 → 정상 입력
        else if (sf === lastCommitted) { sf = ""; }                             // 즉각 replay → 제거
        else if (sf.indexOf(lastCommitted + " ") === 0) {                       // replay + 새 말
          sf = sf.slice(lastCommitted.length).trim(); guardArmed = false;
        } else { guardArmed = false; }                                          // 새 말 시작 → 가드 해제
      }
      sessionFinal = sf;
      interimText = interim;
      render();
    };

    r.onerror = function (e) {
      if (e.error === "not-allowed" || e.error === "service-not-allowed") {
        listening = false;
        showNotice(
          "<b>마이크 사용이 차단되어 있어요.</b><br>" +
          "주소창 옆 자물쇠 아이콘 → 마이크 <b>허용</b>으로 바꾼 뒤 다시 눌러 주세요."
        );
        stopAll();
      } else if (e.error === "no-speech") {
        setStatus("소리가 들리지 않아요. 조금 더 크게 말씀해 주세요.");
      } else if (e.error === "aborted") {
        /* 사용자가 끝낸 경우 — 무시 */
      } else {
        setStatus("잠깐 문제가 생겼어요. 다시 시도할게요.");
      }
    };

    // 모바일은 잠깐 멈추면 자동 종료됨 → 사용자가 끝내기 전이면 다시 켠다
    r.onend = function () {
      dbg("onend listening=" + listening);
      if (listening) {
        commitSession();                                 // 이번 세션 확정분을 잠그고(다음 세션 가드 무장)
        try { r.start(); } catch (err) { /* 곧 다시 시도됨 */ }
      } else {
        finishUp();
      }
    };

    return r;
  }

  // 안드로이드 등에서 recognition.start()가 반복될 때마다 마이크 허용창이 다시 뜨는 걸 막기 위해
  // getUserMedia로 '지속 허용'을 한 번 확보해 둔다. (권한만 받고 스트림은 곧바로 닫는다)
  function ensureMic(cb) {
    if (micReady) { cb(true); return; }
    var md = navigator.mediaDevices;
    if (!md || !md.getUserMedia) { cb(true); return; } // 못 쓰면 그냥 인식 시도
    md.getUserMedia({ audio: true }).then(function (stream) {
      try { stream.getTracks().forEach(function (t) { t.stop(); }); } catch (e) {}
      micReady = true;
      cb(true);
    }).catch(function (e) {
      var name = (e && e.name) ? e.name : "";
      cb(!(name === "NotAllowedError" || name === "SecurityError")); // 차단이면 false
    });
  }

  function start() {
    hideNotice();
    setStatus("마이크를 준비하고 있어요…");
    ensureMic(function (ok) {
      if (!ok) {
        showNotice(
          "<b>마이크 사용이 차단되어 있어요.</b><br>" +
          "주소창 옆 자물쇠(또는 ⋮ 메뉴) → 사이트 설정 → 마이크 <b>허용</b>으로 바꾼 뒤 다시 눌러 주세요."
        );
        setStatus(" ");
        setMode(false);
        return;
      }
      finalText = "";
      sessionFinal = "";
      interimText = "";
      lastCommitted = "";
      lastCommittedAt = 0;
      guardArmed = false;
      setMode(true);
      setStatus("듣고 있어요…");
      render();
      recognition = buildRecognition();
      dbg("start: isAndroid=" + isAndroid + " continuous=" + recognition.continuous);
      try {
        recognition.start();
      } catch (err) {
        // 이미 시작된 상태 등 — 한 번 정리 후 재시도
        try { recognition.abort(); } catch (e) {}
        recognition = buildRecognition();
        try { recognition.start(); } catch (e2) {
          setStatus("마이크를 시작할 수 없어요. 페이지를 새로고침 해 주세요.");
          setMode(false);
        }
      }
    });
  }

  function stop() {
    // 사용자가 "말 다 했어요"를 누름 → 듣기 종료 → onend에서 마무리
    listening = false;
    setStatus("정리하고 있어요…");
    if (recognition) {
      try { recognition.stop(); } catch (e) { finishUp(); }
    } else {
      finishUp();
    }
  }

  function stopAll() {
    listening = false;
    sessionFinal = "";
    guardArmed = false;
    if (recognition) { try { recognition.abort(); } catch (e) {} }
    setMode(false);
    render();
  }

  function finishUp() {
    commitSession();          // 마지막 세션 확정분을 먼저 합친다
    // 남은 중간 말도 확정 처리
    if (interimText) {
      finalText = (finalText + " " + interimText).trim();
      interimText = "";
    }
    if (finalText) finalText = autoPunctuate(finalText); // 의문문이면 끝에 ? 붙임
    setMode(false);
    render();
    setStatus(finalText ? "다 적었어요. 천천히 읽어 보세요." : "들린 말이 없어요. 다시 한 번 말씀해 주세요.");
    if (finalText) statusEl.classList.add("done");   // 완료 → 초록으로 긍정 마무리
  }

  function clearScreen() {
    finalText = "";
    sessionFinal = "";
    interimText = "";
    lastCommitted = "";
    lastCommittedAt = 0;
    guardArmed = false;
    setMode(false);
    setStatus("");
    render();
  }

  // ── 버튼 연결 ──
  mainBtn.addEventListener("click", function () {
    if (listening) { stop(); return; }
    if (starting) return;   // 시작 처리 중 더블탭/고스트클릭으로 인식 인스턴스가 두 개 생기는 것 방지
    starting = true;
    start();
  });
  clearBtn.addEventListener("click", clearScreen);

  // 듣는 중 화면이 꺼지거나 탭을 벗어나면 안전하게 마무리
  document.addEventListener("visibilitychange", function () {
    if (document.hidden && listening) stop();
  });

  // 초기 렌더
  setMode(false);
  render();
})();
</script>

<script>
// ── PWA 서비스워커 등록 (오프라인 + 설치 가능) ──
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function () {});
  });
}

// ── 하단 광고(AdSense) ──
// AdSense 승인 후 아래 두 값만 채우면 자동으로 켜진다. 비어 있으면 광고 자리는 숨김 유지.
(function () {
  var ADSENSE_CLIENT = "";   // 예: "ca-pub-XXXXXXXXXXXXXXXX"
  var ADSENSE_SLOT   = "";   // 예: "1234567890"
  if (!ADSENSE_CLIENT || !ADSENSE_SLOT) return;   // 미설정 → 광고 자리 숨김
  var slot = document.getElementById("adSlot");
  if (!slot) return;
  var s = document.createElement("script");
  s.async = true;
  s.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=" + ADSENSE_CLIENT;
  s.crossOrigin = "anonymous";
  document.head.appendChild(s);
  var ins = document.createElement("ins");
  ins.className = "adsbygoogle";
  ins.style.display = "block";
  ins.style.width = "100%";
  ins.setAttribute("data-ad-client", ADSENSE_CLIENT);
  ins.setAttribute("data-ad-slot", ADSENSE_SLOT);
  ins.setAttribute("data-ad-format", "auto");
  ins.setAttribute("data-full-width-responsive", "true");
  slot.appendChild(ins);
  slot.hidden = false;
  try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
})();
</script>
